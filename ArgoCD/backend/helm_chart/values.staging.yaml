app:
  name: backend
  namespace: default
  replicas: 1
  image:
    repository: "634647866665.dkr.ecr.us-west-2.amazonaws.com/backend-staging"
    tag: "81fdb68e4a3a344925ef9e90ce12cbcdd97d289b"
    pullPolicy: Always
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
hpa:
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
pdb:
  minAvailable: 1
service:
  type: ClusterIP
  port: 5002
  targetPort: 5002
secrets:
  serviceAccountName: flask-app-sa
  providerClassName: rds-secret-provider
  mountPath: /mnt/rds-secret
  k8sSecretName: rds-credentials
  accountNumber: "634647866665"
resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 100m
