app:
  name: backend
  namespace: default
  replicas: 2
  image:
    repository: "634647866665.dkr.ecr.us-west-2.amazonaws.com/backend-prod"
    tag: fc4bb2139f7ca537c85475a793a802ba4322306f
    pullPolicy: Always
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  nodeSelector:
    role: backend
hpa:
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
pdb:
  minAvailable: 1
service:
  type: ClusterIP
  port: 5002
  targetPort: 5002
secrets:
  serviceAccountName: flask-app-sa
  providerClassName: rds-secret-provider
  mountPath: /mnt/rds-secret
  k8sSecretName: rds-credentials
  accountNumber: "634647866665"
resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 100m
