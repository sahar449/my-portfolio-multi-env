apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: alb-ingress-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  generators:
    - list:
        elements:
          - name: alb-controller
            chart: aws-load-balancer-controller
            repoURL: https://aws.github.io/eks-charts
            namespace: kube-system
            targetRevision: 1.8.3
            serviceAccountName: aws-load-balancer-controller
            irsaRoleArn: "arn:aws:iam::634647866665:role/eks-lb-controller-role"
            vpcId: "vpc-0c9b6471e9ff22617"
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: default
      source:
        repoURL: '{{repoURL}}'
        chart: '{{chart}}'
        targetRevision: '{{targetRevision}}'
        helm:
          values: |
            clusterName: eksdemo-cluster
            region: us-west-2
            vpcId: '{{vpcId}}'
            serviceAccount:
              create: true
              name: '{{serviceAccountName}}'
              annotations:
                eks.amazonaws.com/role-arn: '{{irsaRoleArn}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
