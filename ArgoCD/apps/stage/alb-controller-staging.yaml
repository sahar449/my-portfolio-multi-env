apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alb-controller-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://aws.github.io/eks-charts
    chart: aws-load-balancer-controller
    targetRevision: 1.8.3
    helm:
      values: |
        clusterName: "eksdemo-staging-cluster"
        region: us-west-2
        vpcId: "vpc-0ff7a185db74eedd2"
        serviceAccount:
          create: true
          name: aws-load-balancer-controller
          annotations:
            eks.amazonaws.com/role-arn: "arn:aws:iam::634647866665:role/eksdemo-staging-lb-controller-role"
  destination:
    name: eksdemo-staging-cluster
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
