name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Tag Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mathieudutour/github-tag-action@v6.2
        id: tag
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

      - name: Tag released images in ECR
        env:
          AWS_REGION: us-west-2
          VERSION: ${{ steps.tag.outputs.new_version }}
          ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.us-west-2.amazonaws.com
        run: |
          for service in frontend backend; do
            MANIFEST=$(aws ecr batch-get-image \
              --repository-name "${service}-prod" \
              --image-ids imageTag=latest \
              --region "${AWS_REGION}" \
              --query "images[0].imageManifest" --output text 2>/dev/null || true)
            if [ -n "${MANIFEST}" ] && [ "${MANIFEST}" != "None" ]; then
              aws ecr put-image \
                --repository-name "${service}-prod" \
                --image-tag "v${VERSION}" \
                --image-manifest "${MANIFEST}" \
                --region "${AWS_REGION}" || true
            fi
          done
