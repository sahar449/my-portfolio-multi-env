name: CI

on:
  push:
    branches:
      - dev
      - 'feature/**'
    paths:
      - 'services/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to run"
        required: true
        default: "all"
        type: choice
        options:
          - all    # test → build → update values → deploy staging → open PR
          - test   # unit tests + trivy only
          - build  # build + push to ECR (skip tests)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: us-west-2
  IMAGE_TAG: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.stage == 'all' || inputs.stage == 'test' }}
    uses: ./.github/workflows/test.yaml
    secrets: inherit

  build:
    name: Build & Push to Dev ECR
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ github.event_name != 'pull_request' && always() && (github.event_name != 'workflow_dispatch' || inputs.stage == 'all' || inputs.stage == 'build') && needs.test.result != 'failure' }}
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-ci-build

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./services/frontend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:${{ env.IMAGE_TAG }}
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:latest

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./services/backend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:${{ env.IMAGE_TAG }}
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:latest

      - name: Smoke test frontend
        run: |
          docker run -d --name test-frontend -p 5000:5000 \
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:${{ env.IMAGE_TAG }}
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000/health && break
            [ "$i" -eq 15 ] && docker logs test-frontend && exit 1
            sleep 2
          done
          docker rm -f test-frontend

      - name: Smoke test backend
        run: |
          docker run -d --name test-backend -p 5002:5002 \
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:${{ env.IMAGE_TAG }}
          for i in $(seq 1 15); do
            curl -sf http://localhost:5002/health && break
            [ "$i" -eq 15 ] && docker logs test-backend && exit 1
            sleep 2
          done
          docker rm -f test-backend

  update-values:
    name: Update Image Tags in Git
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push' && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: dev
      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq
      - name: Commit updated image tags to dev
        env:
          ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase

          yq e ".app.image.repository = \"${ECR}/frontend-staging\"" -i ArgoCD/frontend/helm_chart/values.staging.yaml
          yq e ".app.image.tag = \"${{ env.IMAGE_TAG }}\"" -i ArgoCD/frontend/helm_chart/values.staging.yaml
          yq e ".app.image.repository = \"${ECR}/backend-staging\"" -i ArgoCD/backend/helm_chart/values.staging.yaml
          yq e ".app.image.tag = \"${{ env.IMAGE_TAG }}\"" -i ArgoCD/backend/helm_chart/values.staging.yaml

          yq e ".app.image.repository = \"${ECR}/frontend-prod\"" -i ArgoCD/frontend/helm_chart/values.prod.yaml
          yq e ".app.image.tag = \"${{ env.IMAGE_TAG }}\"" -i ArgoCD/frontend/helm_chart/values.prod.yaml
          yq e ".app.image.repository = \"${ECR}/backend-prod\"" -i ArgoCD/backend/helm_chart/values.prod.yaml
          yq e ".app.image.tag = \"${{ env.IMAGE_TAG }}\"" -i ArgoCD/backend/helm_chart/values.prod.yaml

          git add ArgoCD/
          git diff --staged --quiet || \
            git commit -m "ci: update image tag to ${{ env.IMAGE_TAG }}"
          git push
