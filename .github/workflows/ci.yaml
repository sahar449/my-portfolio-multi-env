name: CI

on:
  push:
    branches:
      - dev
      - 'feature/**'
    paths:
      - 'services/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-west-2
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yaml
    secrets: inherit

  build:
    name: Build & Push to Dev ECR
    runs-on: ubuntu-latest
    needs: [test]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-ci-build

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./services/frontend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:${{ env.IMAGE_TAG }}
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:latest

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./services/backend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:${{ env.IMAGE_TAG }}
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:latest

      - name: Smoke test frontend
        run: |
          docker run -d --name test-frontend -p 5000:5000 \
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:${{ env.IMAGE_TAG }}
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000/health && break
            [ "$i" -eq 15 ] && docker logs test-frontend && exit 1
            sleep 2
          done
          docker rm -f test-frontend

      - name: Smoke test backend
        run: |
          docker run -d --name test-backend -p 5002:5002 \
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:${{ env.IMAGE_TAG }}
          for i in $(seq 1 15); do
            curl -sf http://localhost:5002/health && break
            [ "$i" -eq 15 ] && docker logs test-backend && exit 1
            sleep 2
          done
          docker rm -f test-backend

      - name: Open PR dev → staging
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh pr list \
            --repo ${{ github.repository }} \
            --base staging --head dev \
            --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — skipping"
          else
            gh pr create \
              --repo ${{ github.repository }} \
              --base staging \
              --head dev \
              --title "promote: dev → staging (${{ github.sha }})" \
              --body "Automated PR — tests passed and images pushed to dev ECR. Merge to deploy to staging."
          fi
