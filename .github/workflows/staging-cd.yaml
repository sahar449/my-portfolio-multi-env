name: CD Staging

on:
  push:
    branches:
      - staging

permissions:
  id-token: write
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-west-2
  MGMT_CLUSTER: eksdemo-mgmt-cluster
  TARGET_CLUSTER: eksdemo-staging-cluster

jobs:
  promote-and-deploy:
    name: Promote & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-cd-staging

      # ── Promote images from dev ECR to staging ECR ────────────────────────
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Promote images dev → staging
        env:
          ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for service in frontend backend; do
            docker pull  ${ECR}/${service}-dev:latest
            docker tag   ${ECR}/${service}-dev:latest ${ECR}/${service}-staging:${IMAGE_TAG}
            docker tag   ${ECR}/${service}-dev:latest ${ECR}/${service}-staging:latest
            docker push  ${ECR}/${service}-staging:${IMAGE_TAG}
            docker push  ${ECR}/${service}-staging:latest
          done

      # ── Connect to mgmt cluster (where ArgoCD lives) ──────────────────────
      - name: Connect to mgmt cluster
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.MGMT_CLUSTER }}

      - name: Install ArgoCD via Helm
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 7.8.23 \
            --wait \
            --timeout 10m \
            -f ArgoCD/argocd-server-values.yaml

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.11.0/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      # ── Register staging cluster via ArgoCD CLI ───────────────────────────
      - name: Register staging cluster with ArgoCD
        run: |
          MGMT_CONTEXT=$(kubectl config current-context)

          echo "Waiting for ArgoCD LoadBalancer hostname..."
          for i in $(seq 1 24); do
            ARGOCD_SERVER=$(kubectl get svc argocd-server -n argocd \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            [ -n "$ARGOCD_SERVER" ] && break
            [ "$i" -eq 24 ] && echo "Timed out waiting for ArgoCD LB" && exit 1
            echo "  attempt $i/24 — not ready yet, waiting 15s..."
            sleep 15
          done
          echo "ArgoCD server: $ARGOCD_SERVER"

          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)

          argocd login "$ARGOCD_SERVER" \
            --username admin \
            --password "$ARGOCD_PASSWORD" \
            --insecure \
            --grpc-web

          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.TARGET_CLUSTER }}

          TARGET_CONTEXT=$(kubectl config current-context)

          argocd cluster get ${{ env.TARGET_CLUSTER }} 2>/dev/null || \
            argocd cluster add "$TARGET_CONTEXT" \
              --name ${{ env.TARGET_CLUSTER }} \
              --yes

          kubectl config use-context "$MGMT_CONTEXT"

      # ── Update image tag in Git ────────────────────────────────────────────
      - name: Update image tag in Git
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_FRONTEND: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-staging
          ECR_BACKEND: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-staging
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase

          yq e ".app.image.repository = \"${ECR_FRONTEND}\"" -i ArgoCD/frontend/helm_chart/values.staging.yaml
          yq e ".app.image.tag = \"${IMAGE_TAG}\"" -i ArgoCD/frontend/helm_chart/values.staging.yaml
          yq e ".app.image.repository = \"${ECR_BACKEND}\"" -i ArgoCD/backend/helm_chart/values.staging.yaml
          yq e ".app.image.tag = \"${IMAGE_TAG}\"" -i ArgoCD/backend/helm_chart/values.staging.yaml

          git add ArgoCD/frontend/helm_chart/values.staging.yaml ArgoCD/backend/helm_chart/values.staging.yaml
          git diff --staged --quiet || git commit -m "cd: promote dev→staging image ${IMAGE_TAG}"
          git push

      - name: Apply ArgoCD staging apps
        run: kubectl apply -f ArgoCD/staging/root-app.yaml

      - name: Wait for apps to be healthy
        run: |
          for i in $(seq 1 40); do
            FRONTEND=$(kubectl get application frontend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            BACKEND=$(kubectl get application backend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i/40 — frontend: $FRONTEND, backend: $BACKEND"
            [ "$FRONTEND" = "Healthy" ] && [ "$BACKEND" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done

