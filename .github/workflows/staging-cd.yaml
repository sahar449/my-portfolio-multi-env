name: CD Staging

on:
  workflow_run:
    workflows: ["CI Staging"]
    types:
      - completed
    branches:
      - staging

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-west-2
  CLUSTER_NAME: eksdemo-cluster

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-cd-staging

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Install ArgoCD via Helm
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 7.8.23 \
            --wait \
            --timeout 10m \
            -f ArgoCD/argocd-server-values.yaml

      - name: Update image tag in Git
        run: |
          IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          ECR_FRONTEND="${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend"
          ECR_BACKEND="${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend"

          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase

          yq e ".app.image.repository = \"${ECR_FRONTEND}\"" -i ArgoCD/frontend/helm_chart/values.staging.yaml
          yq e ".app.image.tag = \"${IMAGE_TAG}\"" -i ArgoCD/frontend/helm_chart/values.staging.yaml
          yq e ".app.image.repository = \"${ECR_BACKEND}\"" -i ArgoCD/backend/helm_chart/values.staging.yaml
          yq e ".app.image.tag = \"${IMAGE_TAG}\"" -i ArgoCD/backend/helm_chart/values.staging.yaml

          git add ArgoCD/frontend/helm_chart/values.staging.yaml ArgoCD/backend/helm_chart/values.staging.yaml
          git diff --staged --quiet || git commit -m "cd: update staging image tag ${IMAGE_TAG}"
          git push

      - name: Apply ArgoCD staging apps
        run: kubectl apply -f ArgoCD/staging/root-app.yaml

      - name: Wait for apps to be healthy
        run: |
          for i in $(seq 1 40); do
            FRONTEND=$(kubectl get application frontend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            BACKEND=$(kubectl get application backend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i/40 — frontend: $FRONTEND, backend: $BACKEND"
            [ "$FRONTEND" = "Healthy" ] && [ "$BACKEND" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done

  # ─────────────────────────────────────────────
  # QA tests — run after deploy is healthy
  # ─────────────────────────────────────────────
  qa-tests:
    name: QA Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install QA dependencies
        run: pip install -r services/tests/qa/requirements.txt

      - name: Run QA tests
        env:
          STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
          STAGING_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
        run: pytest services/tests/qa/ -v --tb=short
