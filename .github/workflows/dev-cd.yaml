name: CD Dev

on:
  workflow_run:
    workflows: ["CI Dev"]
    types:
      - completed
    branches:
      - dev

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: us-west-2
  CLUSTER_NAME: eksdemo-cluster
  VPC_NAME: eksdemo-vpc

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-cd-dev

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Install ArgoCD via Helm
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 7.8.23 \
            --wait \
            --timeout 10m \
            -f ArgoCD/argocd-server-values.yaml

      - name: Update image tag in Git
        run: |
          IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          ECR_FRONTEND="${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend"
          ECR_BACKEND="${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend"

          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase

          yq e ".app.image.repository = \"${ECR_FRONTEND}\"" -i ArgoCD/frontend/helm_chart/values.yaml
          yq e ".app.image.tag = \"${IMAGE_TAG}\"" -i ArgoCD/frontend/helm_chart/values.yaml
          yq e ".app.image.repository = \"${ECR_BACKEND}\"" -i ArgoCD/backend/helm_chart/values.yaml
          yq e ".app.image.tag = \"${IMAGE_TAG}\"" -i ArgoCD/backend/helm_chart/values.yaml

          git add ArgoCD/frontend/helm_chart/values.yaml ArgoCD/backend/helm_chart/values.yaml
          git diff --staged --quiet || git commit -m "cd: update dev image tag ${IMAGE_TAG}"
          git push

      - name: Apply ArgoCD root app
        run: kubectl apply -f ArgoCD/root-app.yaml

      - name: Wait for apps to be healthy
        run: |
          for i in $(seq 1 40); do
            FRONTEND=$(kubectl get application frontend -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            BACKEND=$(kubectl get application backend -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i/40 — frontend: $FRONTEND, backend: $BACKEND"
            [ "$FRONTEND" = "Healthy" ] && [ "$BACKEND" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done

      - name: Open PR to staging
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh pr list --base staging --head dev --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — skipping"
          else
            gh pr create \
              --base staging \
              --head dev \
              --title "promote: dev → staging (${{ github.event.workflow_run.head_sha }})" \
              --body "Automated PR after successful deploy to dev. Review and merge to trigger staging pipeline."
          fi
