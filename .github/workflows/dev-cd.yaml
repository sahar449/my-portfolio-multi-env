name: CD Dev

on:
  workflow_run:
    workflows: ["CI Dev"]
    types:
      - completed
    branches:
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: Open PR to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Open PR to staging
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh pr list \
            --repo ${{ github.repository }} \
            --base staging --head dev \
            --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — skipping"
          else
            gh pr create \
              --repo ${{ github.repository }} \
              --base staging \
              --head dev \
              --title "promote: dev → staging (${{ github.event.workflow_run.head_sha }})" \
              --body "Automated PR after successful CI on dev. Review and merge to trigger staging pipeline."
          fi
