name: Deploy Staging

on:
  push:
    branches: [staging]
    paths: ['services/**']
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Dev image SHA to promote to staging"
        required: false
        default: ""

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: us-west-2
  ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.us-west-2.amazonaws.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-staging

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Promote dev → staging ECR
        run: |
          IMAGE_TAG="${{ inputs.image_sha }}"
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG=$(grep "tag:" ArgoCD/frontend/helm_chart/values.staging.yaml \
              | head -1 | sed 's/.*tag: //;s/"//g;s/latest//')
          fi
          if [ -z "$IMAGE_TAG" ] || [ "$IMAGE_TAG" = "latest" ]; then
            IMAGE_TAG="latest"
          fi
          echo "Promoting image tag: $IMAGE_TAG"
          for service in frontend backend; do
            docker pull  "${{ env.ECR }}/${service}-dev:${IMAGE_TAG}"
            docker tag   "${{ env.ECR }}/${service}-dev:${IMAGE_TAG}" "${{ env.ECR }}/${service}-staging:${IMAGE_TAG}"
            docker tag   "${{ env.ECR }}/${service}-dev:${IMAGE_TAG}" "${{ env.ECR }}/${service}-staging:latest"
            docker push  "${{ env.ECR }}/${service}-staging:${IMAGE_TAG}"
            docker push  "${{ env.ECR }}/${service}-staging:latest"
          done

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Inject account number into staging appset
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git pull --rebase
          yq e '(.spec.template.spec.source.helm.parameters[] | select(.name == "secrets.accountNumber")).value = "${{ secrets.AWS_ACCOUNT_NUMBER }}"' \
            -i ArgoCD/apps/stage/portfolio-staging-appset.yaml
          git add ArgoCD/apps/stage/portfolio-staging-appset.yaml
          git diff --staged --quiet || git commit -m "cd: inject account number for staging [skip actions]"
          git push

      - name: Connect to prod cluster (ArgoCD host)
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster

      - name: Force sync ArgoCD staging
        run: |
          kubectl rollout restart deployment -n default -l app.kubernetes.io/instance=frontend-staging || true
          kubectl rollout restart deployment -n default -l app.kubernetes.io/instance=backend-staging  || true
          kubectl apply -f ArgoCD/bootstrap/root-app.yaml || true

      - name: Wait for staging to be healthy
        run: |
          for i in $(seq 1 40); do
            F=$(kubectl get application frontend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            B=$(kubectl get application backend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i — frontend: $F, backend: $B"
            [ "$F" = "Healthy" ] && [ "$B" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done

  open-prod-pr:
    name: Open PR staging → main
    runs-on: ubuntu-latest
    needs: [deploy]
    if: needs.deploy.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head staging --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open"
          else
            gh pr create \
              --base main \
              --head staging \
              --title "Deploy to production — ${{ github.sha }}" \
              --body "Staging deployed and healthy. Merge to deploy to production."
          fi
