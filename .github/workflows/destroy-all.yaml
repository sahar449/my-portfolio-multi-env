name: Destroy All Environments

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-west-2
  TERRAFORM_VERSION: 1.5.7
  TF_STATE_BUCKET: eksdemo-terraform-state
  MGMT_CLUSTER: eksdemo-mgmt-cluster

jobs:
  # ── Step 1: Delete ArgoCD apps so K8s cleans up LBs before Terraform runs ──
  delete-argocd-apps:
    name: Delete ArgoCD Apps (staging + prod)
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-delete-argocd-apps

      - name: Connect to mgmt cluster
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.MGMT_CLUSTER }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.11.0/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          ARGOCD_SERVER=$(kubectl get svc argocd-server -n argocd \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)
          argocd login "$ARGOCD_SERVER" \
            --username admin \
            --password "$ARGOCD_PASSWORD" \
            --insecure \
            --grpc-web

      - name: Delete staging ArgoCD apps
        run: |
          argocd app delete frontend-staging --yes 2>/dev/null || true
          argocd app delete backend-staging  --yes 2>/dev/null || true

      - name: Delete prod ArgoCD apps
        run: |
          argocd app delete frontend-prod --yes 2>/dev/null || true
          argocd app delete backend-prod  --yes 2>/dev/null || true

      - name: Wait for Load Balancers to be released
        run: |
          echo "Waiting 60s for K8s to delete Load Balancers..."
          sleep 60

  # ── Step 2: Destroy staging + prod in parallel (LBs are gone) ────────────
  destroy-staging:
    name: Destroy Staging
    runs-on: ubuntu-latest
    needs: [delete-argocd-apps]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-destroy-staging
      - name: Terraform Init
        working-directory: infra/envs/staging
        run: terraform init -upgrade
      - name: Read VPC name
        working-directory: infra/envs/staging
        run: echo "VPC_NAME=$(terraform output -raw vpc_name 2>/dev/null || echo '')" >> $GITHUB_ENV
      - name: Cleanup remaining VPC resources
        run: |
          [ -z "$VPC_NAME" ] && echo "No VPC to clean" && exit 0
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=$VPC_NAME" \
            --query "Vpcs[0].VpcId" --output text)
          [ "$VPC_ID" = "None" ] && exit 0
          LB_ARNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?VpcId=='$VPC_ID'].LoadBalancerArn" --output text)
          for arn in $LB_ARNS; do aws elbv2 delete-load-balancer --load-balancer-arn "$arn" || true; done
          [ -n "$LB_ARNS" ] && sleep 15
          TG_ARNS=$(aws elbv2 describe-target-groups \
            --query "TargetGroups[?VpcId=='$VPC_ID'].TargetGroupArn" --output text)
          for arn in $TG_ARNS; do aws elbv2 delete-target-group --target-group-arn "$arn" || true; done
          SGS=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "SecurityGroups[?GroupName!='default'].GroupId" --output text)
          for sg in $SGS; do aws ec2 delete-security-group --group-id "$sg" || true; done
      - name: Terraform Destroy
        working-directory: infra/envs/staging
        run: terraform destroy -auto-approve
      - name: Cleanup state
        run: aws s3 rm s3://${{ env.TF_STATE_BUCKET }}/eksdemo/staging/ --recursive || true

  destroy-prod:
    name: Destroy Prod
    runs-on: ubuntu-latest
    needs: [delete-argocd-apps]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-destroy-prod
      - name: Terraform Init
        working-directory: infra/envs/prod
        run: terraform init -upgrade
      - name: Read VPC name
        working-directory: infra/envs/prod
        run: echo "VPC_NAME=$(terraform output -raw vpc_name 2>/dev/null || echo '')" >> $GITHUB_ENV
      - name: Cleanup remaining VPC resources
        run: |
          [ -z "$VPC_NAME" ] && echo "No VPC to clean" && exit 0
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=$VPC_NAME" \
            --query "Vpcs[0].VpcId" --output text)
          [ "$VPC_ID" = "None" ] && exit 0
          LB_ARNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?VpcId=='$VPC_ID'].LoadBalancerArn" --output text)
          for arn in $LB_ARNS; do aws elbv2 delete-load-balancer --load-balancer-arn "$arn" || true; done
          [ -n "$LB_ARNS" ] && sleep 15
          TG_ARNS=$(aws elbv2 describe-target-groups \
            --query "TargetGroups[?VpcId=='$VPC_ID'].TargetGroupArn" --output text)
          for arn in $TG_ARNS; do aws elbv2 delete-target-group --target-group-arn "$arn" || true; done
          SGS=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "SecurityGroups[?GroupName!='default'].GroupId" --output text)
          for sg in $SGS; do aws ec2 delete-security-group --group-id "$sg" || true; done
      - name: Terraform Destroy
        working-directory: infra/envs/prod
        run: terraform destroy -auto-approve
      - name: Cleanup state
        run: aws s3 rm s3://${{ env.TF_STATE_BUCKET }}/eksdemo/prod/ --recursive || true

  # ── Step 3: Destroy dev (ECR repos used by staging/prod must be gone first) ─
  destroy-dev:
    name: Destroy Dev
    runs-on: ubuntu-latest
    needs: [destroy-staging, destroy-prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-destroy-dev
      - name: Terraform Init
        working-directory: infra/envs/dev
        run: terraform init -upgrade
      - name: Terraform Destroy
        working-directory: infra/envs/dev
        run: terraform destroy -auto-approve
      - name: Cleanup state
        run: aws s3 rm s3://${{ env.TF_STATE_BUCKET }}/eksdemo/dev/ --recursive || true

  # ── Step 4: Destroy mgmt LAST (ArgoCD hub lives here) ────────────────────
  destroy-mgmt:
    name: Destroy Mgmt (ArgoCD hub)
    runs-on: ubuntu-latest
    needs: [destroy-staging, destroy-prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-destroy-mgmt
      - name: Terraform Init
        working-directory: infra/envs/mgmt
        run: terraform init -upgrade
      - name: Terraform Destroy
        working-directory: infra/envs/mgmt
        run: terraform destroy -auto-approve
      - name: Cleanup state
        run: aws s3 rm s3://${{ env.TF_STATE_BUCKET }}/eksdemo/mgmt/ --recursive || true
