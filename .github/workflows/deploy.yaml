name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-west-2

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    env:
      CLUSTER_NAME: eksdemo-staging-cluster
      ALB_FILE: ArgoCD/apps/stage/alb-controller-staging.yaml
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-staging

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Promote images dev → staging
        env:
          ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          for service in frontend backend; do
            docker pull  "${ECR}/${service}-dev:latest"
            docker tag   "${ECR}/${service}-dev:latest" "${ECR}/${service}-staging:${IMAGE_TAG}"
            docker tag   "${ECR}/${service}-dev:latest" "${ECR}/${service}-staging:latest"
            docker push  "${ECR}/${service}-staging:${IMAGE_TAG}"
            docker push  "${ECR}/${service}-staging:latest"
          done

      - name: Connect to prod cluster (ArgoCD host)
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster

      - name: Install ArgoCD
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm || true
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --version 7.8.23 \
            --namespace argocd \
            --create-namespace \
            --values ArgoCD/argocd-server-values.yaml \
            --wait --timeout 10m

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.14.4/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Register staging cluster with ArgoCD
        run: |
          PROD_CONTEXT=$(kubectl config current-context)

          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath='{.data.password}' | base64 --decode)

          # Port-forward so argocd CLI connects locally — no DNS/LB dependency
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          PF_PID=$!
          sleep 5

          argocd login localhost:8080 \
            --username admin \
            --password "$ARGOCD_PASSWORD" \
            --insecure

          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} \
            --name eksdemo-staging-cluster --alias eksdemo-staging-cluster

          argocd cluster get eksdemo-staging-cluster 2>/dev/null || \
            argocd cluster add eksdemo-staging-cluster --name eksdemo-staging-cluster --yes || true

          kill $PF_PID || true
          kubectl config use-context "$PROD_CONTEXT"

      - name: Update values in Git
        env:
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_NUMBER }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase

          sed -i "s|tag:.*|tag: \"${IMAGE_TAG}\"|" ArgoCD/frontend/helm_chart/values.staging.yaml
          sed -i "s|tag:.*|tag: \"${IMAGE_TAG}\"|" ArgoCD/backend/helm_chart/values.staging.yaml
          sed -i "s|ACCOUNT_ID|${ACCOUNT}|g" ArgoCD/backend/helm_chart/values.staging.yaml
          sed -i "s|arn:aws:iam::[^:]*:role/|arn:aws:iam::${ACCOUNT}:role/|g" ArgoCD/backend/helm_chart/values.staging.yaml

          VPC_ID=$(aws eks describe-cluster --name ${{ env.CLUSTER_NAME }} \
            --query 'cluster.resourcesVpcConfig.vpcId' --output text --region ${{ env.AWS_REGION }})
          sed -i "s|vpcId: \"[^\"]*\"|vpcId: \"${VPC_ID}\"|" ${{ env.ALB_FILE }}
          sed -i "s|arn:aws:iam::[^:]*:role/|arn:aws:iam::${ACCOUNT}:role/|g" ${{ env.ALB_FILE }}

          git add ArgoCD/frontend/helm_chart/values.staging.yaml \
                  ArgoCD/backend/helm_chart/values.staging.yaml \
                  ${{ env.ALB_FILE }}
          git diff --staged --quiet || git commit -m "cd: deploy to staging image ${IMAGE_TAG}"
          git push

      - name: Apply ArgoCD apps
        run: kubectl apply -f ArgoCD/bootstrap/root-app.yaml

      - name: Wait for apps to be healthy
        run: |
          for i in $(seq 1 40); do
            FRONTEND=$(kubectl get application frontend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            BACKEND=$(kubectl get application backend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i/40 — frontend: $FRONTEND, backend: $BACKEND"
            [ "$FRONTEND" = "Healthy" ] && [ "$BACKEND" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done
