name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [dev]
  push:
    branches: [main]
    paths: ['ArgoCD/**']
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to run"
        required: true
        default: "staging"
        type: choice
        options:
          - staging     # deploy to staging only
          - production  # deploy to production only

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: us-west-2
  # When triggered by workflow_run use the CI commit SHA, otherwise current SHA
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────────
  # DEPLOY TO STAGING — triggered when CI passes on dev
  # ─────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && inputs.stage == 'staging')
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-staging

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Promote images dev → staging ECR
        env:
          ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          for service in frontend backend; do
            docker pull  "${ECR}/${service}-dev:latest"
            docker tag   "${ECR}/${service}-dev:latest" "${ECR}/${service}-staging:${{ env.IMAGE_TAG }}"
            docker tag   "${ECR}/${service}-dev:latest" "${ECR}/${service}-staging:latest"
            docker push  "${ECR}/${service}-staging:${{ env.IMAGE_TAG }}"
            docker push  "${ECR}/${service}-staging:latest"
          done

      - name: Connect to prod cluster (ArgoCD host)
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster

      - name: Apply ArgoCD staging apps
        run: kubectl apply -f ArgoCD/bootstrap/root-app.yaml || true

      - name: Wait for staging apps to be healthy
        run: |
          for i in $(seq 1 40); do
            FRONTEND=$(kubectl get application frontend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            BACKEND=$(kubectl get application backend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i/40 — frontend: $FRONTEND, backend: $BACKEND"
            [ "$FRONTEND" = "Healthy" ] && [ "$BACKEND" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done

  # ─────────────────────────────────────────────────────────────────
  # QA & E2E TESTS
  # ─────────────────────────────────────────────────────────────────
  qa-tests:
    name: QA & E2E Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install QA dependencies
        run: pip install -r services/tests/qa/requirements.txt

      - name: Run QA tests
        env:
          STAGING_FRONTEND_URL: https://stage.saharbittman.com
          STAGING_BACKEND_URL: https://stage.saharbittman.com
        run: pytest services/tests/qa/ -v --tb=short

      - name: Install E2E dependencies
        run: pip install -r services/tests/e2e/requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          STAGING_FRONTEND_URL: https://stage.saharbittman.com
        run: pytest services/tests/e2e/ -v --tb=short

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # OPEN PR dev → main after staging + QA pass
  # ─────────────────────────────────────────────────────────────────
  open-pr:
    name: Open PR dev → main
    runs-on: ubuntu-latest
    needs: [qa-tests]
    if: needs.qa-tests.result == 'success' && github.event_name == 'workflow_run'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - name: Create PR to main (skip if already open)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head dev --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open — skipping"
          else
            gh pr create \
              --base main \
              --head dev \
              --title "Deploy v${{ env.IMAGE_TAG }} to production" \
              --body "Staging and QA passed. Merge this PR to trigger production deployment."
            echo "PR created"
          fi

  # ─────────────────────────────────────────────────────────────────
  # DEPLOY TO PRODUCTION — triggered when PR is merged to main
  # environment: production provides the manual approval gate
  # ─────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.stage == 'production')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-production

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Read image tag from values.prod.yaml
        id: tag
        run: |
          TAG=$(grep 'tag:' ArgoCD/frontend/helm_chart/values.prod.yaml | head -1 | sed 's/.*tag: *"\(.*\)"/\1/')
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "Deploying image tag: $TAG"

      - name: Promote images staging → prod ECR
        env:
          ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          for service in frontend backend; do
            docker pull  "${ECR}/${service}-staging:latest"
            docker tag   "${ECR}/${service}-staging:latest" "${ECR}/${service}-prod:${{ env.IMAGE_TAG }}"
            docker tag   "${ECR}/${service}-staging:latest" "${ECR}/${service}-prod:latest"
            docker push  "${ECR}/${service}-prod:${{ env.IMAGE_TAG }}"
            docker push  "${ECR}/${service}-prod:latest"
          done

      - name: Connect to prod cluster
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster

      - name: Apply ArgoCD prod apps
        run: kubectl apply -f ArgoCD/bootstrap/root-app.yaml || true

      - name: Wait for prod apps to be healthy
        run: |
          for i in $(seq 1 40); do
            FRONTEND=$(kubectl get application frontend-prod -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            BACKEND=$(kubectl get application backend-prod -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i/40 — frontend: $FRONTEND, backend: $BACKEND"
            [ "$FRONTEND" = "Healthy" ] && [ "$BACKEND" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done

      - name: Tag version
        id: version-tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version-tag.outputs.new_tag }}
          name: ${{ steps.version-tag.outputs.new_tag }}
          body: ${{ steps.version-tag.outputs.changelog }}
