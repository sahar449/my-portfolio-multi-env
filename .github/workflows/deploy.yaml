name: Deploy

on:
  push:
    branches: ['release/**', main]
    paths: ['services/**']
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to deploy"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: us-west-2
  ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.us-west-2.amazonaws.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Staging ──────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: |
      (startsWith(github.ref, 'refs/heads/release/') && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.stage == 'staging')
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-staging

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Promote dev → staging ECR
        run: |
          for service in frontend backend; do
            docker pull  "${{ env.ECR }}/${service}-dev:latest"
            docker tag   "${{ env.ECR }}/${service}-dev:latest" "${{ env.ECR }}/${service}-staging:${{ github.sha }}"
            docker tag   "${{ env.ECR }}/${service}-dev:latest" "${{ env.ECR }}/${service}-staging:latest"
            docker push  "${{ env.ECR }}/${service}-staging:${{ github.sha }}"
            docker push  "${{ env.ECR }}/${service}-staging:latest"
          done

      - name: Update staging image tags in Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git pull --rebase
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" ArgoCD/frontend/helm_chart/values.staging.yaml
          sed -i "s|repository:.*|repository: \"${{ env.ECR }}/frontend-staging\"|" ArgoCD/frontend/helm_chart/values.staging.yaml
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" ArgoCD/backend/helm_chart/values.staging.yaml
          sed -i "s|repository:.*|repository: \"${{ env.ECR }}/backend-staging\"|" ArgoCD/backend/helm_chart/values.staging.yaml
          git add ArgoCD/
          git diff --staged --quiet || git commit -m "cd: staging image ${{ github.sha }} [skip actions]"
          git push

      - name: Connect to prod cluster (ArgoCD host)
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster

      - name: Sync ArgoCD staging
        run: kubectl apply -f ArgoCD/bootstrap/root-app.yaml || true

      - name: Wait for staging to be healthy
        run: |
          for i in $(seq 1 40); do
            F=$(kubectl get application frontend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            B=$(kubectl get application backend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i — frontend: $F, backend: $B"
            [ "$F" = "Healthy" ] && [ "$B" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done

  qa-tests:
    name: QA & Integration Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run QA tests
        env:
          STAGING_FRONTEND_URL: https://stage.saharbittman.com
          STAGING_BACKEND_URL: https://stage.saharbittman.com/api/backend
        run: |
          pip install -r services/tests/qa/requirements.txt
          pytest services/tests/qa/ -v --tb=short

      - name: Run E2E tests
        env:
          STAGING_FRONTEND_URL: https://stage.saharbittman.com
        run: |
          pip install -r services/tests/e2e/requirements.txt
          playwright install --with-deps chromium
          pytest services/tests/e2e/ -v --tb=short

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  open-prod-pr:
    name: Open PR release → main
    runs-on: ubuntu-latest
    needs: [qa-tests]
    if: needs.qa-tests.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          RELEASE_BRANCH: ${{ github.ref_name }}
        run: |
          EXISTING=$(gh pr list --base main --head "$RELEASE_BRANCH" --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open"
          else
            gh pr create \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "Release $RELEASE_BRANCH → production" \
              --body "Staging healthy and QA passed for $RELEASE_BRANCH. Merge to deploy to production."
          fi

  # ── Production ───────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.stage == 'production')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-production

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Promote staging → prod ECR
        run: |
          for service in frontend backend; do
            docker pull  "${{ env.ECR }}/${service}-staging:latest"
            docker tag   "${{ env.ECR }}/${service}-staging:latest" "${{ env.ECR }}/${service}-prod:${{ github.sha }}"
            docker tag   "${{ env.ECR }}/${service}-staging:latest" "${{ env.ECR }}/${service}-prod:latest"
            docker push  "${{ env.ECR }}/${service}-prod:${{ github.sha }}"
            docker push  "${{ env.ECR }}/${service}-prod:latest"
          done

      - name: Update prod image tags in Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git pull --rebase
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" ArgoCD/frontend/helm_chart/values.prod.yaml
          sed -i "s|repository:.*|repository: \"${{ env.ECR }}/frontend-prod\"|" ArgoCD/frontend/helm_chart/values.prod.yaml
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" ArgoCD/backend/helm_chart/values.prod.yaml
          sed -i "s|repository:.*|repository: \"${{ env.ECR }}/backend-prod\"|" ArgoCD/backend/helm_chart/values.prod.yaml
          git add ArgoCD/
          git diff --staged --quiet || git commit -m "cd: prod image ${{ github.sha }} [skip actions]"
          git push

      - name: Connect to prod cluster
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster

      - name: Sync ArgoCD prod
        run: kubectl apply -f ArgoCD/bootstrap/root-app.yaml || true

      - name: Wait for prod to be healthy
        run: |
          for i in $(seq 1 40); do
            F=$(kubectl get application frontend-prod -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            B=$(kubectl get application backend-prod -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i — frontend: $F, backend: $B"
            [ "$F" = "Healthy" ] && [ "$B" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done

      - name: Tag & Release
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
