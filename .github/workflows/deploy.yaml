name: Deploy

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to run"
        required: true
        default: "all"
        type: choice
        options:
          - all        # staging → QA → production
          - staging    # deploy to staging only
          - qa         # run QA & E2E tests only
          - production # deploy to production only

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-west-2

jobs:
  # ─────────────────────────────────────────────────────────────────
  # DEPLOY TO STAGING
  # ─────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.stage == 'all' || inputs.stage == 'staging' }}
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-staging

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Promote images dev → staging
        env:
          ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for service in frontend backend; do
            docker pull  ${ECR}/${service}-dev:latest
            docker tag   ${ECR}/${service}-dev:latest ${ECR}/${service}-staging:${IMAGE_TAG}
            docker tag   ${ECR}/${service}-dev:latest ${ECR}/${service}-staging:latest
            docker push  ${ECR}/${service}-staging:${IMAGE_TAG}
            docker push  ${ECR}/${service}-staging:latest
          done

      - name: Connect to prod cluster (ArgoCD host)
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster

      - name: Install ArgoCD via Helm
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 7.8.23 \
            --wait \
            --timeout 10m \
            -f ArgoCD/argocd-server-values.yaml

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.11.0/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Register staging cluster with ArgoCD
        run: |
          MGMT_CONTEXT=$(kubectl config current-context)

          ARGOCD_SERVER=$(kubectl get ingress argocd-server -n argocd \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)

          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)

          argocd login "$ARGOCD_SERVER" \
            --username admin \
            --password "$ARGOCD_PASSWORD" \
            --insecure \
            --grpc-web

          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-staging-cluster
          TARGET_CONTEXT=$(kubectl config current-context)

          argocd cluster get eksdemo-staging-cluster 2>/dev/null || \
            argocd cluster add "$TARGET_CONTEXT" --name eksdemo-staging-cluster --yes

          kubectl config use-context "$MGMT_CONTEXT"

      - name: Update image tag in Git
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase

          yq e ".app.image.repository = \"${ECR}/frontend-staging\"" -i ArgoCD/frontend/helm_chart/values.staging.yaml
          yq e ".app.image.tag = \"${IMAGE_TAG}\"" -i ArgoCD/frontend/helm_chart/values.staging.yaml
          yq e ".app.image.repository = \"${ECR}/backend-staging\"" -i ArgoCD/backend/helm_chart/values.staging.yaml
          yq e ".app.image.tag = \"${IMAGE_TAG}\"" -i ArgoCD/backend/helm_chart/values.staging.yaml

          git add ArgoCD/frontend/helm_chart/values.staging.yaml ArgoCD/backend/helm_chart/values.staging.yaml
          git diff --staged --quiet || git commit -m "cd: deploy to staging image ${IMAGE_TAG}"
          git push

      - name: Apply ArgoCD staging apps
        run: kubectl apply -f ArgoCD/staging/root-app.yaml

      - name: Wait for apps to be healthy
        run: |
          for i in $(seq 1 40); do
            FRONTEND=$(kubectl get application frontend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            BACKEND=$(kubectl get application backend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i/40 — frontend: $FRONTEND, backend: $BACKEND"
            [ "$FRONTEND" = "Healthy" ] && [ "$BACKEND" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done

  # ─────────────────────────────────────────────────────────────────
  # QA & E2E TESTS
  # ─────────────────────────────────────────────────────────────────
  qa-tests:
    name: QA & E2E Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.stage == 'all' || inputs.stage == 'qa') && needs.deploy-staging.result != 'failure' }}
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install QA dependencies
        run: pip install -r services/tests/qa/requirements.txt

      - name: Run QA tests
        env:
          STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
          STAGING_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
        run: pytest services/tests/qa/ -v --tb=short

      - name: Install E2E dependencies
        run: pip install -r services/tests/e2e/requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
        run: pytest services/tests/e2e/ -v --tb=short

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # DEPLOY TO PRODUCTION — requires manual approval via GitHub env
  # ─────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [qa-tests]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.stage == 'all' || inputs.stage == 'production') && needs.qa-tests.result != 'failure' }}
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-production

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Promote images staging → prod
        env:
          ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for service in frontend backend; do
            docker pull  ${ECR}/${service}-staging:latest
            docker tag   ${ECR}/${service}-staging:latest ${ECR}/${service}-prod:${IMAGE_TAG}
            docker tag   ${ECR}/${service}-staging:latest ${ECR}/${service}-prod:latest
            docker push  ${ECR}/${service}-prod:${IMAGE_TAG}
            docker push  ${ECR}/${service}-prod:latest
          done

      - name: Connect to prod cluster
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster

      - name: Install ArgoCD via Helm
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 7.8.23 \
            --wait \
            --timeout 10m \
            -f ArgoCD/argocd-server-values.yaml

      - name: Update image tag in Git
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase

          yq e ".app.image.repository = \"${ECR}/frontend-prod\"" -i ArgoCD/frontend/helm_chart/values.prod.yaml
          yq e ".app.image.tag = \"${IMAGE_TAG}\"" -i ArgoCD/frontend/helm_chart/values.prod.yaml
          yq e ".app.image.repository = \"${ECR}/backend-prod\"" -i ArgoCD/backend/helm_chart/values.prod.yaml
          yq e ".app.image.tag = \"${IMAGE_TAG}\"" -i ArgoCD/backend/helm_chart/values.prod.yaml

          git add ArgoCD/frontend/helm_chart/values.prod.yaml ArgoCD/backend/helm_chart/values.prod.yaml
          git diff --staged --quiet || git commit -m "cd: deploy to production image ${IMAGE_TAG}"
          git push

      - name: Apply ArgoCD prod apps
        run: kubectl apply -f ArgoCD/prod/root-app.yaml

      - name: Wait for apps to be healthy
        run: |
          for i in $(seq 1 40); do
            FRONTEND=$(kubectl get application frontend-prod -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            BACKEND=$(kubectl get application backend-prod -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i/40 — frontend: $FRONTEND, backend: $BACKEND"
            [ "$FRONTEND" = "Healthy" ] && [ "$BACKEND" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done
