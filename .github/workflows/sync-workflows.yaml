name: Sync Workflows

on:
  push:
    branches: [dev]
    paths: ['.github/workflows/**']

concurrency:
  group: sync-workflows
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    name: Sync to ${{ matrix.branch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: [staging, main]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Sync workflow files to ${{ matrix.branch }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          FALLBACK_TOKEN: ${{ github.token }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          git fetch origin ${{ matrix.branch }}
          git checkout ${{ matrix.branch }}
          git checkout origin/dev -- .github/workflows/

          if git diff --staged --quiet; then
            echo "No workflow changes to sync to ${{ matrix.branch }}"
            exit 0
          fi

          TOKEN="${GH_PAT:-$FALLBACK_TOKEN}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          git commit -m "sync: workflow files from dev [skip actions]"
          git push origin ${{ matrix.branch }}
          echo "Synced to ${{ matrix.branch }}"
