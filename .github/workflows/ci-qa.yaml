name: CI QA

on:
  workflow_run:
    workflows: ["CI Dev"]
    types: [completed]
    branches: ['feature/qa-**']
  pull_request:
    branches: [staging]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run QA tests on"
        required: false
        default: "dev"

concurrency:
  group: ci-qa-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: services/frontend
        run: pip install -r requirements.txt

      - name: Lint
        run: pip install ruff==0.9.10 && python -m ruff check services/frontend/

      - name: Run unit tests
        working-directory: services/frontend
        run: pytest tests/ -v

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: services/backend
        run: pip install -r requirements.txt

      - name: Lint
        run: pip install ruff==0.9.10 && python -m ruff check services/backend/

      - name: Run unit tests
        working-directory: services/backend
        run: pytest tests/ -v

  integration-tests:
    name: QA & Integration Tests
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build images locally
        run: |
          docker build -t frontend-local:test ./services/frontend
          docker build -t backend-local:test ./services/backend

      - name: Start services
        run: |
          docker run -d --name frontend -p 5000:5000 frontend-local:test
          docker run -d --name backend  -p 5002:5002 backend-local:test
          for i in $(seq 1 20); do
            curl -sf http://localhost:5000/health && \
            curl -sf http://localhost:5002/health && break
            [ "$i" -eq 20 ] && docker logs frontend && docker logs backend && exit 1
            sleep 3
          done

      - name: Run QA & integration tests
        env:
          STAGING_FRONTEND_URL: http://localhost:5000
          STAGING_BACKEND_URL:  http://localhost:5002
        run: |
          pip install -r services/tests/qa/requirements.txt
          pytest services/tests/qa/ -v --tb=short

      - name: Stop services
        if: always()
        run: docker rm -f frontend backend || true

  deploy-to-staging:
    name: Trigger Staging Deploy
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: >
      needs.integration-tests.result == 'success' &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Trigger deploy-staging workflow
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          IMAGE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh workflow run deploy-staging.yaml \
            --repo ${{ github.repository }} \
            --ref staging \
            --field image_sha="${IMAGE_SHA}"
          echo "Staging deploy triggered for image ${IMAGE_SHA}"
