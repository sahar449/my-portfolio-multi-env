name: CI QA

on:
  workflow_run:
    workflows: ["CI Dev"]
    types: [completed]
    branches: ['feature/qa-**']
  pull_request:
    branches: [staging]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run QA tests on"
        required: false
        default: "dev"

concurrency:
  group: ci-qa-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: services/frontend
        run: pip install -r requirements.txt

      - name: Lint
        run: pip install ruff==0.9.10 && python -m ruff check services/frontend/

      - name: Run unit tests
        working-directory: services/frontend
        run: pytest tests/ -v

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: services/backend
        run: pip install -r requirements.txt

      - name: Lint
        run: pip install ruff==0.9.10 && python -m ruff check services/backend/

      - name: Run unit tests
        working-directory: services/backend
        run: pytest tests/ -v

  integration-tests:
    name: QA & Integration Tests
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build images locally
        run: |
          docker build -t frontend-local:test ./services/frontend
          docker build -t backend-local:test ./services/backend

      - name: Start services
        run: |
          docker run -d --name frontend -p 5000:5000 frontend-local:test
          docker run -d --name backend  -p 5002:5002 backend-local:test
          for i in $(seq 1 20); do
            curl -sf http://localhost:5000/health && \
            curl -sf http://localhost:5002/health && break
            [ "$i" -eq 20 ] && docker logs frontend && docker logs backend && exit 1
            sleep 3
          done

      - name: Run QA & integration tests
        env:
          STAGING_FRONTEND_URL: http://localhost:5000
          STAGING_BACKEND_URL:  http://localhost:5002
        run: |
          pip install -r services/tests/qa/requirements.txt
          pytest services/tests/qa/ -v --tb=short

      - name: Stop services
        if: always()
        run: docker rm -f frontend backend || true

  deploy-to-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [integration-tests]
    environment: staging
    if: >
      needs.integration-tests.result == 'success' &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    env:
      AWS_REGION: us-west-2
      ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.us-west-2.amazonaws.com
      IMAGE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-staging

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Promote dev → staging ECR
        run: |
          echo "Promoting image: $IMAGE_SHA"
          for service in frontend backend; do
            docker pull  "${{ env.ECR }}/${service}-dev:${IMAGE_SHA}"
            docker tag   "${{ env.ECR }}/${service}-dev:${IMAGE_SHA}" "${{ env.ECR }}/${service}-staging:${IMAGE_SHA}"
            docker tag   "${{ env.ECR }}/${service}-dev:${IMAGE_SHA}" "${{ env.ECR }}/${service}-staging:latest"
            docker push  "${{ env.ECR }}/${service}-staging:${IMAGE_SHA}"
            docker push  "${{ env.ECR }}/${service}-staging:latest"
          done

      - name: Connect to prod cluster (ArgoCD host)
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster

      - name: Sync ArgoCD staging
        run: |
          kubectl rollout restart deployment -n default -l app.kubernetes.io/instance=frontend-staging || true
          kubectl rollout restart deployment -n default -l app.kubernetes.io/instance=backend-staging  || true
          kubectl apply -f ArgoCD/bootstrap/root-app.yaml || true

      - name: Wait for staging to be healthy
        run: |
          for i in $(seq 1 40); do
            F=$(kubectl get application frontend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            B=$(kubectl get application backend-staging -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i — frontend: $F, backend: $B"
            [ "$F" = "Healthy" ] && [ "$B" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done

      - name: Open PR staging → main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head staging --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open"
          else
            gh pr create \
              --base main \
              --head staging \
              --title "Deploy to production — ${{ env.IMAGE_SHA }}" \
              --body "Staging deployed successfully. Image: ${{ env.IMAGE_SHA }}"
          fi
