name: CI Dev

on:
  push:
    branches: ['feature/**']
    paths: ['services/**']
  pull_request:
    branches: [dev]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run CI on"
        required: false
        default: "dev"

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: us-west-2
  IMAGE_TAG: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./services/frontend
          scanners: vuln,secret,config
          format: table
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: services/frontend
        run: pip install -r requirements.txt

      - name: Lint
        working-directory: services/frontend
        run: python -m ruff check .

      - name: Run unit tests
        working-directory: services/frontend
        run: pytest tests/ -v

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./services/backend
          scanners: vuln,secret,config
          format: table
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: services/backend
        run: pip install -r requirements.txt

      - name: Lint
        working-directory: services/backend
        run: python -m ruff check .

      - name: Run unit tests
        working-directory: services/backend
        run: pytest tests/ -v

  build:
    name: Build & Push to Dev ECR
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: github.event_name == 'push' && startsWith(github.ref_name, 'feature/')
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-ci-build

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./services/frontend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:${{ env.IMAGE_TAG }}
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:latest

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./services/backend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:${{ env.IMAGE_TAG }}
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:latest

      - name: Smoke test frontend
        run: |
          docker run -d --name test-frontend -p 5000:5000 \
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:${{ env.IMAGE_TAG }}
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000/health && break
            [ "$i" -eq 15 ] && docker logs test-frontend && exit 1
            sleep 2
          done
          docker rm -f test-frontend

      - name: Smoke test backend
        run: |
          docker run -d --name test-backend -p 5002:5002 \
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:${{ env.IMAGE_TAG }}
          for i in $(seq 1 15); do
            curl -sf http://localhost:5002/health && break
            [ "$i" -eq 15 ] && docker logs test-backend && exit 1
            sleep 2
          done
          docker rm -f test-backend

  open-pr:
    name: Open PR feature → dev
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref_name, 'feature/')
    steps:
      - uses: actions/checkout@v4
      - name: Open PR to dev
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          FALLBACK_TOKEN: ${{ github.token }}
          HEAD: ${{ github.ref_name }}
        run: |
          GH_TOKEN="${GH_TOKEN:-$FALLBACK_TOKEN}"
          export GH_TOKEN

          AHEAD=$(gh api repos/${{ github.repository }}/compare/dev...$HEAD --jq '.ahead_by')
          if [ "$AHEAD" -eq 0 ]; then
            echo "No commits ahead of dev — skipping PR"
            exit 0
          fi

          EXISTING=$(gh pr list --base dev --head "$HEAD" --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open"
          else
            gh pr create \
              --base dev \
              --head "$HEAD" \
              --title "[$HEAD] → dev" \
              --body "CI passed (tests + build + smoke tests). Ready for review."
          fi
