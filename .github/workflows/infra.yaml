name: Infra

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy
      environment:
        description: "Choose environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read
  actions: write

env:
  AWS_REGION: us-west-2
  TERRAFORM_VERSION: 1.5.7
  TF_STATE_BUCKET: eksdemo-terraform-state
  TF_LOCK_TABLE: terraform-locks

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: FORMAT (terraform fmt)
  # like black for Python
  # ─────────────────────────────────────────────
  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: terraform fmt
        working-directory: infra/envs/${{ github.event.inputs.environment }}
        run: terraform fmt -check -recursive

  # ─────────────────────────────────────────────
  # JOB 2: VALIDATE (terraform validate)
  # like compiler — checks syntax and types
  # ─────────────────────────────────────────────
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [bootstrap]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-validate
      - name: terraform init
        working-directory: infra/envs/${{ github.event.inputs.environment }}
        run: terraform init -upgrade
      - name: terraform validate
        working-directory: infra/envs/${{ github.event.inputs.environment }}
        run: terraform validate

  # ─────────────────────────────────────────────
  # JOB 3: TFLINT
  # like flake8 with AWS knowledge —
  # checks AMI IDs, instance types, deprecated resources
  # ─────────────────────────────────────────────
  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tflint
      - name: Init tflint with AWS plugin
        working-directory: infra/envs/${{ github.event.inputs.environment }}
        run: tflint --init --config ../../.tflint.hcl
      - name: Run tflint
        working-directory: infra/envs/${{ github.event.inputs.environment }}
        run: tflint --minimum-failure-severity=error --config ../../.tflint.hcl

  # ─────────────────────────────────────────────
  # JOB 4: TRIVY IaC SCAN
  # ─────────────────────────────────────────────
  trivy-scan:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan infra
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/envs/${{ github.event.inputs.environment }}/
          scanners: config,secret
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

  # ─────────────────────────────────────────────
  # JOB 5: BOOTSTRAP — create S3 bucket + DynamoDB
  # runs first on apply so validate can use real backend
  # skipped on destroy (bucket already exists)
  # ─────────────────────────────────────────────
  bootstrap:
    name: Bootstrap State Backend
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'apply' }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-bootstrap

      - name: Create S3 bucket for Terraform state
        run: |
          if ! aws s3api head-bucket --bucket ${{ env.TF_STATE_BUCKET }} 2>/dev/null; then
            aws s3api create-bucket \
              --bucket ${{ env.TF_STATE_BUCKET }} \
              --region ${{ env.AWS_REGION }} \
              --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}
            aws s3api put-bucket-versioning \
              --bucket ${{ env.TF_STATE_BUCKET }} \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket ${{ env.TF_STATE_BUCKET }} \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

      - name: Create DynamoDB table for state locking
        run: |
          if ! aws dynamodb describe-table --table-name ${{ env.TF_LOCK_TABLE }} 2>/dev/null; then
            aws dynamodb create-table \
              --table-name ${{ env.TF_LOCK_TABLE }} \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region ${{ env.AWS_REGION }}
            aws dynamodb wait table-exists --table-name ${{ env.TF_LOCK_TABLE }}
          fi

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [fmt, validate, tflint, trivy-scan, bootstrap]
    if: ${{ github.event.inputs.action == 'apply' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-infra

      - name: Terraform Init
        run: terraform init -upgrade
        working-directory: infra/envs/${{ github.event.inputs.environment }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: infra/envs/${{ github.event.inputs.environment }}

      - name: Destroy on failure
        if: failure()
        run: terraform destroy -auto-approve
        working-directory: infra/envs/${{ github.event.inputs.environment }}

      - name: Trigger CI pipeline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "$ENV" = "dev" ]; then
            gh workflow run dev-ci.yaml --ref dev
          elif [ "$ENV" = "staging" ]; then
            gh workflow run staging-ci.yaml --ref staging
          fi

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: [fmt, validate, tflint, trivy-scan]
    if: ${{ github.event.inputs.action == 'destroy' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-infra-destroy

      - name: Read VPC name from Terraform
        working-directory: infra/envs/${{ github.event.inputs.environment }}
        run: echo "VPC_NAME=$(terraform output -raw vpc_name)" >> $GITHUB_ENV

      - name: Cleanup VPC resources
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=${{ env.VPC_NAME }}" \
            --query "Vpcs[0].VpcId" --output text)

          LB_ARNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?VpcId=='$VPC_ID'].LoadBalancerArn" --output text)
          for arn in $LB_ARNS; do
            aws elbv2 delete-load-balancer --load-balancer-arn "$arn" || true
          done
          [ -n "$LB_ARNS" ] && sleep 15

          TG_ARNS=$(aws elbv2 describe-target-groups \
            --query "TargetGroups[?VpcId=='$VPC_ID'].TargetGroupArn" --output text)
          for arn in $TG_ARNS; do
            aws elbv2 delete-target-group --target-group-arn "$arn" || true
          done

          SGS=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "SecurityGroups[?GroupName!='default'].GroupId" --output text)
          for sg in $SGS; do
            aws ec2 delete-security-group --group-id "$sg" || true
          done

          ENIS=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "NetworkInterfaces[?Status=='available'].NetworkInterfaceId" --output text)
          for eni in $ENIS; do
            aws ec2 delete-network-interface --network-interface-id "$eni" || true
          done

      - name: Terraform Init
        run: terraform init -upgrade
        working-directory: infra/envs/${{ github.event.inputs.environment }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: infra/envs/${{ github.event.inputs.environment }}

      - name: Cleanup state backend
        if: success()
        run: |
          aws s3 rm s3://${{ env.TF_STATE_BUCKET }}/eksdemo/${{ github.event.inputs.environment }}/ --recursive || true
