name: Deploy Production

on:
  push:
    branches: [main]
    paths: ['services/**']
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: us-west-2
  ECR: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.us-west-2.amazonaws.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-production

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Promote staging → prod ECR
        run: |
          for service in frontend backend; do
            docker pull  "${{ env.ECR }}/${service}-staging:latest"
            docker tag   "${{ env.ECR }}/${service}-staging:latest" "${{ env.ECR }}/${service}-prod:${{ github.sha }}"
            docker tag   "${{ env.ECR }}/${service}-staging:latest" "${{ env.ECR }}/${service}-prod:latest"
            docker push  "${{ env.ECR }}/${service}-prod:${{ github.sha }}"
            docker push  "${{ env.ECR }}/${service}-prod:latest"
          done

      - name: Update prod image tags in Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git pull --rebase
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" ArgoCD/frontend/helm_chart/values.prod.yaml
          sed -i "s|repository:.*|repository: \"${{ env.ECR }}/frontend-prod\"|" ArgoCD/frontend/helm_chart/values.prod.yaml
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" ArgoCD/backend/helm_chart/values.prod.yaml
          sed -i "s|repository:.*|repository: \"${{ env.ECR }}/backend-prod\"|" ArgoCD/backend/helm_chart/values.prod.yaml
          git add ArgoCD/
          git diff --staged --quiet || git commit -m "cd: prod image ${{ github.sha }} [skip actions]"
          git push

      - name: Connect to prod cluster
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster

      - name: Sync ArgoCD prod
        run: kubectl apply -f ArgoCD/bootstrap/root-app.yaml || true

      - name: Wait for prod to be healthy
        run: |
          for i in $(seq 1 40); do
            F=$(kubectl get application frontend-prod -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            B=$(kubectl get application backend-prod -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "NotFound")
            echo "Attempt $i — frontend: $F, backend: $B"
            [ "$F" = "Healthy" ] && [ "$B" = "Healthy" ] && break
            [ "$i" -eq 40 ] && exit 1
            sleep 15
          done

      - name: Tag & Release
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
