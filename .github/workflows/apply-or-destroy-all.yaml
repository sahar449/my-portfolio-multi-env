name: Manage All Environments

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-west-2
  TERRAFORM_VERSION: 1.5.7
  TF_STATE_BUCKET: eksdemo-terraform-state
  TF_LOCK_TABLE: terraform-locks
  MGMT_CLUSTER: eksdemo-mgmt-cluster

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # APPLY — all 4 environments in parallel
  # ════════════════════════════════════════════════════════════════════════════

  bootstrap:
    name: Bootstrap State Backend
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'apply' }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-bootstrap-all

      - name: Create S3 bucket for Terraform state
        run: |
          if ! aws s3api head-bucket --bucket ${{ env.TF_STATE_BUCKET }} 2>/dev/null; then
            aws s3api create-bucket \
              --bucket ${{ env.TF_STATE_BUCKET }} \
              --region ${{ env.AWS_REGION }} \
              --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}
            aws s3api put-bucket-versioning \
              --bucket ${{ env.TF_STATE_BUCKET }} \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket ${{ env.TF_STATE_BUCKET }} \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

      - name: Create DynamoDB table for state locking
        run: |
          if ! aws dynamodb describe-table --table-name ${{ env.TF_LOCK_TABLE }} 2>/dev/null; then
            aws dynamodb create-table \
              --table-name ${{ env.TF_LOCK_TABLE }} \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region ${{ env.AWS_REGION }}
            aws dynamodb wait table-exists --table-name ${{ env.TF_LOCK_TABLE }}
          fi

  apply-dev:
    name: Apply Dev
    runs-on: ubuntu-latest
    needs: [bootstrap]
    if: ${{ inputs.action == 'apply' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply-dev
      - name: Terraform Init
        working-directory: infra/envs/dev
        run: terraform init -upgrade
      - name: Terraform Apply
        working-directory: infra/envs/dev
        run: terraform apply -auto-approve

  apply-mgmt:
    name: Apply Mgmt
    runs-on: ubuntu-latest
    needs: [bootstrap]
    if: ${{ inputs.action == 'apply' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply-mgmt
      - name: Terraform Init
        working-directory: infra/envs/mgmt
        run: terraform init -upgrade
      - name: Terraform Apply
        working-directory: infra/envs/mgmt
        run: terraform apply -auto-approve
      - name: Grant admin user cluster access
        run: |
          aws eks create-access-entry \
            --cluster-name ${{ env.MGMT_CLUSTER }} \
            --principal-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_NUMBER }}:user/${{ secrets.AWS_USER }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws eks associate-access-policy \
            --cluster-name ${{ env.MGMT_CLUSTER }} \
            --principal-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_NUMBER }}:user/${{ secrets.AWS_USER }} \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

  apply-staging:
    name: Apply Staging
    runs-on: ubuntu-latest
    needs: [bootstrap]
    if: ${{ inputs.action == 'apply' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply-staging
      - name: Terraform Init
        working-directory: infra/envs/staging
        run: terraform init -upgrade
      - name: Terraform Apply
        working-directory: infra/envs/staging
        run: terraform apply -auto-approve
      - name: Grant admin user cluster access
        run: |
          aws eks create-access-entry \
            --cluster-name eksdemo-staging-cluster \
            --principal-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_NUMBER }}:user/${{ secrets.AWS_USER }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws eks associate-access-policy \
            --cluster-name eksdemo-staging-cluster \
            --principal-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_NUMBER }}:user/${{ secrets.AWS_USER }} \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

  apply-prod:
    name: Apply Prod
    runs-on: ubuntu-latest
    needs: [bootstrap]
    if: ${{ inputs.action == 'apply' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply-prod
      - name: Terraform Init
        working-directory: infra/envs/prod
        run: terraform init -upgrade
      - name: Terraform Apply
        working-directory: infra/envs/prod
        run: terraform apply -auto-approve
      - name: Grant admin user cluster access
        run: |
          aws eks create-access-entry \
            --cluster-name eksdemo-prod-cluster \
            --principal-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_NUMBER }}:user/${{ secrets.AWS_USER }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws eks associate-access-policy \
            --cluster-name eksdemo-prod-cluster \
            --principal-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_NUMBER }}:user/${{ secrets.AWS_USER }} \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

  # ════════════════════════════════════════════════════════════════════════════
  # DESTROY — ordered: ArgoCD → pre-delete → staging/prod → dev/mgmt
  # ════════════════════════════════════════════════════════════════════════════

  delete-argocd-apps:
    name: Delete ArgoCD Apps (staging + prod)
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'destroy' }}
    continue-on-error: true
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-delete-argocd-apps

      - name: Connect to mgmt cluster and delete ArgoCD apps
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.MGMT_CLUSTER }} 2>/dev/null || {
            echo "Mgmt cluster not found — skipping ArgoCD cleanup"
            exit 0
          }
          for app in frontend-staging backend-staging frontend-prod backend-prod; do
            kubectl delete application "$app" -n argocd \
              --ignore-not-found --timeout=60s 2>/dev/null || true
            echo "Deleted (or not found): $app"
          done
          echo "Waiting 60s for K8s to release Load Balancers..."
          sleep 60

  pre-delete-staging:
    name: Pre-delete Staging (nodegroups + RDS)
    runs-on: ubuntu-latest
    needs: [delete-argocd-apps]
    if: ${{ always() && inputs.action == 'destroy' }}
    continue-on-error: true
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-pre-delete-staging

      - name: Delete EKS nodegroups
        run: |
          CLUSTER="eksdemo-staging-cluster"
          aws eks describe-cluster --name "$CLUSTER" --region ${{ env.AWS_REGION }} &>/dev/null || {
            echo "Cluster not found — skipping"; exit 0
          }
          NGs=$(aws eks list-nodegroups --cluster-name "$CLUSTER" \
            --region ${{ env.AWS_REGION }} --query 'nodegroups[]' --output text 2>/dev/null || true)
          for ng in $NGs; do
            aws eks delete-nodegroup --cluster-name "$CLUSTER" \
              --nodegroup-name "$ng" --region ${{ env.AWS_REGION }} || true
          done
          for ng in $NGs; do
            aws eks wait nodegroup-deleted --cluster-name "$CLUSTER" \
              --nodegroup-name "$ng" --region ${{ env.AWS_REGION }} || true
          done

      - name: Delete RDS instances
        run: |
          for DB in mydb staging-mydb eksdemo-staging-mydb; do
            if aws rds describe-db-instances --db-instance-identifier "$DB" \
                --region ${{ env.AWS_REGION }} &>/dev/null 2>&1; then
              aws rds delete-db-instance --db-instance-identifier "$DB" \
                --skip-final-snapshot --region ${{ env.AWS_REGION }} || true
              aws rds wait db-instance-deleted --db-instance-identifier "$DB" \
                --region ${{ env.AWS_REGION }} || true
            fi
          done

  pre-delete-prod:
    name: Pre-delete Prod (nodegroups + RDS)
    runs-on: ubuntu-latest
    needs: [delete-argocd-apps]
    if: ${{ always() && inputs.action == 'destroy' }}
    continue-on-error: true
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-pre-delete-prod

      - name: Delete EKS nodegroups
        run: |
          CLUSTER="eksdemo-prod-cluster"
          aws eks describe-cluster --name "$CLUSTER" --region ${{ env.AWS_REGION }} &>/dev/null || {
            echo "Cluster not found — skipping"; exit 0
          }
          NGs=$(aws eks list-nodegroups --cluster-name "$CLUSTER" \
            --region ${{ env.AWS_REGION }} --query 'nodegroups[]' --output text 2>/dev/null || true)
          for ng in $NGs; do
            aws eks delete-nodegroup --cluster-name "$CLUSTER" \
              --nodegroup-name "$ng" --region ${{ env.AWS_REGION }} || true
          done
          for ng in $NGs; do
            aws eks wait nodegroup-deleted --cluster-name "$CLUSTER" \
              --nodegroup-name "$ng" --region ${{ env.AWS_REGION }} || true
          done

      - name: Delete RDS instances
        run: |
          for DB in mydb prod-mydb; do
            if aws rds describe-db-instances --db-instance-identifier "$DB" \
                --region ${{ env.AWS_REGION }} &>/dev/null 2>&1; then
              aws rds delete-db-instance --db-instance-identifier "$DB" \
                --skip-final-snapshot --region ${{ env.AWS_REGION }} || true
              aws rds wait db-instance-deleted --db-instance-identifier "$DB" \
                --region ${{ env.AWS_REGION }} || true
            fi
          done

  destroy-staging:
    name: Destroy Staging
    runs-on: ubuntu-latest
    needs: [pre-delete-staging]
    if: ${{ always() && inputs.action == 'destroy' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-destroy-staging
      - name: Terraform Init
        working-directory: infra/envs/staging
        run: terraform init -upgrade
      - name: Cleanup orphaned VPC resources
        working-directory: infra/envs/staging
        run: |
          VPC_NAME=$(terraform output -raw vpc_name 2>/dev/null || echo '')
          [ -z "$VPC_NAME" ] && echo "No VPC output — skipping" && exit 0
          VPC_ID=$(aws ec2 describe-vpcs --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Name,Values=${VPC_NAME}" \
            --query "Vpcs[0].VpcId" --output text)
          [ "$VPC_ID" = "None" ] && exit 0
          LB_ARNS=$(aws elbv2 describe-load-balancers --region ${{ env.AWS_REGION }} \
            --query "LoadBalancers[?VpcId=='$VPC_ID'].LoadBalancerArn" --output text)
          for arn in $LB_ARNS; do
            aws elbv2 delete-load-balancer --load-balancer-arn "$arn" --region ${{ env.AWS_REGION }} || true
          done
          [ -n "$LB_ARNS" ] && sleep 15 || true
          TG_ARNS=$(aws elbv2 describe-target-groups --region ${{ env.AWS_REGION }} \
            --query "TargetGroups[?VpcId=='$VPC_ID'].TargetGroupArn" --output text)
          for arn in $TG_ARNS; do
            aws elbv2 delete-target-group --target-group-arn "$arn" --region ${{ env.AWS_REGION }} || true
          done
      - name: Terraform Destroy
        working-directory: infra/envs/staging
        run: terraform destroy -auto-approve
      - name: Cleanup state
        if: always()
        run: aws s3 rm s3://${{ env.TF_STATE_BUCKET }}/eksdemo/staging/ --recursive || true

  destroy-prod:
    name: Destroy Prod
    runs-on: ubuntu-latest
    needs: [pre-delete-prod]
    if: ${{ always() && inputs.action == 'destroy' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-destroy-prod
      - name: Terraform Init
        working-directory: infra/envs/prod
        run: terraform init -upgrade
      - name: Cleanup orphaned VPC resources
        working-directory: infra/envs/prod
        run: |
          VPC_NAME=$(terraform output -raw vpc_name 2>/dev/null || echo '')
          [ -z "$VPC_NAME" ] && echo "No VPC output — skipping" && exit 0
          VPC_ID=$(aws ec2 describe-vpcs --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Name,Values=${VPC_NAME}" \
            --query "Vpcs[0].VpcId" --output text)
          [ "$VPC_ID" = "None" ] && exit 0
          LB_ARNS=$(aws elbv2 describe-load-balancers --region ${{ env.AWS_REGION }} \
            --query "LoadBalancers[?VpcId=='$VPC_ID'].LoadBalancerArn" --output text)
          for arn in $LB_ARNS; do
            aws elbv2 delete-load-balancer --load-balancer-arn "$arn" --region ${{ env.AWS_REGION }} || true
          done
          [ -n "$LB_ARNS" ] && sleep 15 || true
          TG_ARNS=$(aws elbv2 describe-target-groups --region ${{ env.AWS_REGION }} \
            --query "TargetGroups[?VpcId=='$VPC_ID'].TargetGroupArn" --output text)
          for arn in $TG_ARNS; do
            aws elbv2 delete-target-group --target-group-arn "$arn" --region ${{ env.AWS_REGION }} || true
          done
      - name: Terraform Destroy
        working-directory: infra/envs/prod
        run: terraform destroy -auto-approve
      - name: Cleanup state
        if: always()
        run: aws s3 rm s3://${{ env.TF_STATE_BUCKET }}/eksdemo/prod/ --recursive || true

  destroy-dev:
    name: Destroy Dev
    runs-on: ubuntu-latest
    needs: [destroy-staging, destroy-prod]
    if: ${{ always() && inputs.action == 'destroy' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-destroy-dev
      - name: Terraform Init
        working-directory: infra/envs/dev
        run: terraform init -upgrade
      - name: Terraform Destroy
        working-directory: infra/envs/dev
        run: terraform destroy -auto-approve
      - name: Cleanup state
        if: always()
        run: aws s3 rm s3://${{ env.TF_STATE_BUCKET }}/eksdemo/dev/ --recursive || true

  destroy-mgmt:
    name: Destroy Mgmt (ArgoCD hub)
    runs-on: ubuntu-latest
    needs: [destroy-staging, destroy-prod]
    if: ${{ always() && inputs.action == 'destroy' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-destroy-mgmt
      - name: Delete mgmt EKS nodegroups before Terraform
        run: |
          CLUSTER="${{ env.MGMT_CLUSTER }}"
          aws eks describe-cluster --name "$CLUSTER" --region ${{ env.AWS_REGION }} &>/dev/null || {
            echo "Mgmt cluster not found — skipping"; exit 0
          }
          NGs=$(aws eks list-nodegroups --cluster-name "$CLUSTER" \
            --region ${{ env.AWS_REGION }} --query 'nodegroups[]' --output text 2>/dev/null || true)
          for ng in $NGs; do
            aws eks delete-nodegroup --cluster-name "$CLUSTER" \
              --nodegroup-name "$ng" --region ${{ env.AWS_REGION }} || true
          done
          for ng in $NGs; do
            aws eks wait nodegroup-deleted --cluster-name "$CLUSTER" \
              --nodegroup-name "$ng" --region ${{ env.AWS_REGION }} || true
          done
      - name: Terraform Init
        working-directory: infra/envs/mgmt
        run: terraform init -upgrade
      - name: Terraform Destroy
        working-directory: infra/envs/mgmt
        run: terraform destroy -auto-approve
      - name: Cleanup state
        if: always()
        run: aws s3 rm s3://${{ env.TF_STATE_BUCKET }}/eksdemo/mgmt/ --recursive || true
