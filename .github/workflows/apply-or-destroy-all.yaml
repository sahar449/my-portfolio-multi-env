name: Manage All Environments

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write
  contents: write
  actions: write

env:
  AWS_REGION: us-west-2
  TERRAFORM_VERSION: 1.10.5
  TF_STATE_BUCKET: eksdemo-terraform-state
  TF_LOCK_TABLE: terraform-locks
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────────────────────────
  # APPLY PATH
  # ─────────────────────────────────────────────────────────────────

  bootstrap:
    name: Bootstrap State Backend
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'apply' }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-bootstrap-all

      - name: Create S3 bucket for Terraform state
        run: |
          if ! aws s3api head-bucket --bucket ${{ env.TF_STATE_BUCKET }} 2>/dev/null; then
            aws s3api create-bucket \
              --bucket ${{ env.TF_STATE_BUCKET }} \
              --region ${{ env.AWS_REGION }} \
              --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}
            aws s3api put-bucket-versioning \
              --bucket ${{ env.TF_STATE_BUCKET }} \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket ${{ env.TF_STATE_BUCKET }} \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

      - name: Create DynamoDB table for state locking
        run: |
          if ! aws dynamodb describe-table --table-name ${{ env.TF_LOCK_TABLE }} 2>/dev/null; then
            aws dynamodb create-table \
              --table-name ${{ env.TF_LOCK_TABLE }} \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region ${{ env.AWS_REGION }}
            aws dynamodb wait table-exists --table-name ${{ env.TF_LOCK_TABLE }}
          fi

  apply-dev:
    name: Apply Dev
    runs-on: ubuntu-latest
    needs: [bootstrap]
    if: ${{ inputs.action == 'apply' }}
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply-dev
      - name: Clear stale DynamoDB state checksum
        run: |
          aws dynamodb delete-item \
            --table-name ${{ env.TF_LOCK_TABLE }} \
            --key '{"LockID":{"S":"${{ env.TF_STATE_BUCKET }}/eksdemo/dev/terraform.tfstate-md5"}}' \
            --region ${{ env.AWS_REGION }} || true
      - name: Terraform Init
        working-directory: infra/envs/dev
        run: terraform init -upgrade
      - name: Terraform Apply
        working-directory: infra/envs/dev
        run: terraform apply -auto-approve

  apply-staging:
    name: Apply Staging
    runs-on: ubuntu-latest
    needs: [bootstrap]
    if: ${{ inputs.action == 'apply' }}
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply-staging
      - name: Clear stale DynamoDB state checksum
        run: |
          aws dynamodb delete-item \
            --table-name ${{ env.TF_LOCK_TABLE }} \
            --key '{"LockID":{"S":"${{ env.TF_STATE_BUCKET }}/eksdemo/staging/terraform.tfstate-md5"}}' \
            --region ${{ env.AWS_REGION }} || true
      - name: Terraform Init
        working-directory: infra/envs/staging
        run: terraform init -upgrade
      - name: Terraform Apply
        working-directory: infra/envs/staging
        run: terraform apply -auto-approve
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-staging-cluster
      - name: Configure aws-auth
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: aws-auth
            namespace: kube-system
          data:
            mapUsers: |
              - userarn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_NUMBER }}:user/${{ secrets.AWS_USER }}
                username: ${{ secrets.AWS_USER }}
                groups:
                  - system:masters
          EOF

  apply-prod:
    name: Apply Prod
    runs-on: ubuntu-latest
    needs: [bootstrap]
    if: ${{ inputs.action == 'apply' }}
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply-prod
      - name: Clear stale DynamoDB state checksum
        run: |
          aws dynamodb delete-item \
            --table-name ${{ env.TF_LOCK_TABLE }} \
            --key '{"LockID":{"S":"${{ env.TF_STATE_BUCKET }}/eksdemo/prod/terraform.tfstate-md5"}}' \
            --region ${{ env.AWS_REGION }} || true
      - name: Terraform Init
        working-directory: infra/envs/production
        run: terraform init -upgrade
      - name: Terraform Apply
        working-directory: infra/envs/production
        run: terraform apply -auto-approve
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster
      - name: Configure aws-auth
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: aws-auth
            namespace: kube-system
          data:
            mapUsers: |
              - userarn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_NUMBER }}:user/${{ secrets.AWS_USER }}
                username: ${{ secrets.AWS_USER }}
                groups:
                  - system:masters
          EOF

      - name: Register staging cluster with ArgoCD
        run: |
          PROD_CONTEXT=$(kubectl config current-context)

          kubectl wait --for=condition=available deployment/argocd-server \
            -n argocd --timeout=300s

          # Get staging cluster info
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} \
            --name eksdemo-staging-cluster --alias eksdemo-staging-cluster
          STAGING_CONTEXT=$(kubectl config current-context)
          STAGING_ENDPOINT=$(aws eks describe-cluster \
            --name eksdemo-staging-cluster \
            --region ${{ env.AWS_REGION }} \
            --query 'cluster.endpoint' --output text)

          # Create argocd-manager service account in staging cluster with cluster-admin
          kubectl --context "$STAGING_CONTEXT" create serviceaccount argocd-manager \
            -n kube-system --dry-run=client -o yaml | \
            kubectl --context "$STAGING_CONTEXT" apply -f -
          kubectl --context "$STAGING_CONTEXT" create clusterrolebinding argocd-manager-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=kube-system:argocd-manager \
            --dry-run=client -o yaml | \
            kubectl --context "$STAGING_CONTEXT" apply -f -

          # Create a long-lived token secret (required for K8s 1.24+)
          kubectl --context "$STAGING_CONTEXT" apply -f - <<'MANIFEST'
          apiVersion: v1
          kind: Secret
          metadata:
            name: argocd-manager-token
            namespace: kube-system
            annotations:
              kubernetes.io/service-account.name: argocd-manager
          type: kubernetes.io/service-account-token
          MANIFEST
          sleep 10

          BEARER_TOKEN=$(kubectl --context "$STAGING_CONTEXT" get secret argocd-manager-token \
            -n kube-system -o jsonpath='{.data.token}' | base64 --decode)
          STAGING_CA=$(kubectl --context "$STAGING_CONTEXT" get secret argocd-manager-token \
            -n kube-system -o jsonpath='{.data.ca\.crt}')

          # Switch back to prod context
          kubectl config use-context "$PROD_CONTEXT"

          # Build the cluster config JSON safely with jq
          CONFIG=$(jq -n \
            --arg token "$BEARER_TOKEN" \
            --arg ca "$STAGING_CA" \
            '{"bearerToken":$token,"tlsClientConfig":{"insecure":false,"caData":$ca}}')

          # Create the ArgoCD cluster secret directly — no argocd CLI or port-forward needed
          kubectl create secret generic cluster-eksdemo-staging \
            -n argocd \
            --from-literal=name=eksdemo-staging-cluster \
            --from-literal=server="$STAGING_ENDPOINT" \
            --from-literal=config="$CONFIG" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl label secret cluster-eksdemo-staging -n argocd \
            argocd.argoproj.io/secret-type=cluster --overwrite

          echo "=== Verifying staging cluster is registered ==="
          kubectl get secret cluster-eksdemo-staging -n argocd \
            -o jsonpath='{.metadata.labels}' && echo ""
          echo "Server: $STAGING_ENDPOINT"

      - name: Print ArgoCD password
        run: |
          echo "ArgoCD password: $(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath='{.data.password}' | base64 --decode)"

  # ─────────────────────────────────────────────────────────────────
  # TRIGGER CI → DEPLOY AFTER INFRA IS READY
  # ─────────────────────────────────────────────────────────────────

  run-pipeline:
    name: Trigger CI → Deploy
    runs-on: ubuntu-latest
    needs: [apply-dev, apply-staging, apply-prod]
    if: ${{ inputs.action == 'apply' }}
    steps:
      - name: Trigger CI and wait for it to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          echo "=== Triggering CI workflow ==="
          gh workflow run ci.yaml --repo "$REPO" --ref "$REF"
          sleep 10

          # Get the run ID of the CI run we just triggered (most recent)
          CI_RUN_ID=$(gh run list --repo "$REPO" --workflow ci.yaml \
            --limit 1 --json databaseId -q '.[0].databaseId')
          echo "CI run ID: $CI_RUN_ID"

          echo "=== Waiting for CI to complete ==="
          for i in $(seq 1 60); do
            STATUS=$(gh run view "$CI_RUN_ID" --repo "$REPO" \
              --json status,conclusion -q '.status + ":" + (.conclusion // "")')
            echo "CI status ($i/60): $STATUS"
            [[ "$STATUS" == "completed:"* ]] && break
            sleep 30
          done

          CONCLUSION=$(gh run view "$CI_RUN_ID" --repo "$REPO" \
            --json conclusion -q '.conclusion')
          echo "CI conclusion: $CONCLUSION"
          if [ "$CONCLUSION" != "success" ]; then
            echo "CI failed — skipping Deploy"
            exit 1
          fi

      - name: Trigger Deploy and wait for it to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          echo "=== Triggering Deploy workflow ==="
          gh workflow run deploy.yaml --repo "$REPO" --ref "$REF"
          sleep 10

          DEPLOY_RUN_ID=$(gh run list --repo "$REPO" --workflow deploy.yaml \
            --limit 1 --json databaseId -q '.[0].databaseId')
          echo "Deploy run ID: $DEPLOY_RUN_ID"

          echo "=== Waiting for Deploy to complete ==="
          for i in $(seq 1 80); do
            STATUS=$(gh run view "$DEPLOY_RUN_ID" --repo "$REPO" \
              --json status,conclusion -q '.status + ":" + (.conclusion // "")')
            echo "Deploy status ($i/80): $STATUS"
            [[ "$STATUS" == "completed:"* ]] && break
            sleep 30
          done

          CONCLUSION=$(gh run view "$DEPLOY_RUN_ID" --repo "$REPO" \
            --json conclusion -q '.conclusion')
          echo "Deploy conclusion: $CONCLUSION"
          [ "$CONCLUSION" = "success" ] || exit 1

  # ─────────────────────────────────────────────────────────────────
  # DESTROY PATH
  # ─────────────────────────────────────────────────────────────────

  delete-argocd-apps:
    name: Delete ArgoCD Apps
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'destroy' }}
    environment: production
    continue-on-error: true
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-delete-argocd
      - name: Connect to prod cluster (ArgoCD host)
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster || true
      - name: Delete ArgoCD applications
        run: |
          # Remove finalizers so ArgoCD doesn't cascade-wait for resource cleanup
          kubectl get applications,applicationsets -n argocd -o name 2>/dev/null | \
            xargs -r -I {} kubectl patch {} -n argocd \
              --type merge -p '{"metadata":{"finalizers":null}}' || true
          kubectl delete applications --all -n argocd --ignore-not-found --timeout=60s || true
          kubectl delete applicationsets --all -n argocd --ignore-not-found --timeout=60s || true

      - name: Cleanup External DNS Route53 ownership records
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?contains(Name,'saharbittman.com')].Id" \
            --output text | sed 's|/hostedzone/||') || true
          if [ -z "$ZONE_ID" ]; then echo "No hosted zone found, skipping"; exit 0; fi

          CHANGES=$(aws route53 list-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --query "ResourceRecordSets[?Type=='TXT']" \
            --output json | \
            jq '[.[] | select(.ResourceRecords[].Value | contains("heritage=external-dns")) | {Action:"DELETE",ResourceRecordSet:.}] | {Changes:.}')

          if [ "$(echo "$CHANGES" | jq '.Changes | length')" -gt 0 ]; then
            aws route53 change-resource-record-sets \
              --hosted-zone-id "$ZONE_ID" \
              --change-batch "$CHANGES" || true
            echo "Deleted $(echo "$CHANGES" | jq '.Changes | length') External DNS TXT records"
          else
            echo "No External DNS TXT records found"
          fi

  pre-delete-staging:
    name: Pre-delete Staging VPC Resources
    runs-on: ubuntu-latest
    needs: [delete-argocd-apps]
    if: ${{ always() && inputs.action == 'destroy' }}
    environment: staging
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-pre-delete-staging
      - name: Cleanup VPC resources
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=eksdemo-staging-vpc" \
            --query "Vpcs[0].VpcId" --output text 2>/dev/null || echo "")
          if [ -z "${VPC_ID}" ] || [ "${VPC_ID}" = "None" ]; then exit 0; fi

          echo "=== Delete ALBs and poll until gone ==="
          LB_ARNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?VpcId=='${VPC_ID}'].LoadBalancerArn" --output text || true)
          for arn in ${LB_ARNS}; do aws elbv2 delete-load-balancer --load-balancer-arn "$arn" || true; done
          if [ -n "${LB_ARNS}" ]; then
            for i in $(seq 1 20); do
              REMAINING=$(aws elbv2 describe-load-balancers \
                --query "LoadBalancers[?VpcId=='${VPC_ID}'].LoadBalancerArn" --output text || true)
              [ -z "$REMAINING" ] && break
              echo "Waiting for ALBs... ($i/20)"; sleep 15
            done
            sleep 30
          fi

          echo "=== Delete target groups ==="
          TG_ARNS=$(aws elbv2 describe-target-groups \
            --query "TargetGroups[?VpcId=='${VPC_ID}'].TargetGroupArn" --output text || true)
          for arn in ${TG_ARNS}; do aws elbv2 delete-target-group --target-group-arn "$arn" || true; done

          echo "=== Delete NAT gateways and poll until fully deleted ==="
          NATS=$(aws ec2 describe-nat-gateways \
            --filter "Name=vpc-id,Values=${VPC_ID}" \
            --query "NatGateways[?State!='deleted'].NatGatewayId" --output text || true)
          for nat in ${NATS}; do aws ec2 delete-nat-gateway --nat-gateway-id "$nat" || true; done
          if [ -n "${NATS}" ]; then
            for i in $(seq 1 20); do
              REMAINING=$(aws ec2 describe-nat-gateways \
                --filter "Name=vpc-id,Values=${VPC_ID}" \
                --query "NatGateways[?State!='deleted'].NatGatewayId" --output text || true)
              [ -z "$REMAINING" ] && echo "All NAT gateways deleted" && break
              echo "Waiting for NAT gateways... ($i/20)"; sleep 15
            done
          fi

          echo "=== Release EIPs ==="
          EIPS=$(aws ec2 describe-addresses \
            --filters "Name=domain,Values=vpc" \
            --query "Addresses[?AssociationId==null].AllocationId" --output text || true)
          for eip in ${EIPS}; do aws ec2 release-address --allocation-id "$eip" || true; done

          echo "=== Delete security groups ==="
          SGS=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --query "SecurityGroups[?GroupName!='default'].GroupId" --output text || true)
          for sg in ${SGS}; do aws ec2 delete-security-group --group-id "$sg" || true; done

          echo "=== Delete available ENIs ==="
          ENIS=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --query "NetworkInterfaces[?Status=='available'].NetworkInterfaceId" --output text || true)
          for eni in ${ENIS}; do aws ec2 delete-network-interface --network-interface-id "$eni" || true; done

  pre-delete-prod:
    name: Pre-delete Prod VPC Resources
    runs-on: ubuntu-latest
    needs: [delete-argocd-apps]
    environment: production
    if: ${{ always() && inputs.action == 'destroy' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-pre-delete-prod
      - name: Connect to prod cluster
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eksdemo-prod-cluster || true
      - name: Uninstall Helm releases before Terraform destroy
        run: |
          helm uninstall aws-load-balancer-controller -n kube-system || true
          helm uninstall argocd -n argocd || true
      - name: Cleanup VPC resources
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=eksdemo-prod-vpc" \
            --query "Vpcs[0].VpcId" --output text 2>/dev/null || echo "")
          if [ -z "${VPC_ID}" ] || [ "${VPC_ID}" = "None" ]; then exit 0; fi

          echo "=== Delete ALBs and poll until gone ==="
          LB_ARNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?VpcId=='${VPC_ID}'].LoadBalancerArn" --output text || true)
          for arn in ${LB_ARNS}; do aws elbv2 delete-load-balancer --load-balancer-arn "$arn" || true; done
          if [ -n "${LB_ARNS}" ]; then
            for i in $(seq 1 20); do
              REMAINING=$(aws elbv2 describe-load-balancers \
                --query "LoadBalancers[?VpcId=='${VPC_ID}'].LoadBalancerArn" --output text || true)
              [ -z "$REMAINING" ] && break
              echo "Waiting for ALBs... ($i/20)"; sleep 15
            done
            sleep 30
          fi

          echo "=== Delete target groups ==="
          TG_ARNS=$(aws elbv2 describe-target-groups \
            --query "TargetGroups[?VpcId=='${VPC_ID}'].TargetGroupArn" --output text || true)
          for arn in ${TG_ARNS}; do aws elbv2 delete-target-group --target-group-arn "$arn" || true; done

          echo "=== Delete NAT gateways and poll until fully deleted ==="
          NATS=$(aws ec2 describe-nat-gateways \
            --filter "Name=vpc-id,Values=${VPC_ID}" \
            --query "NatGateways[?State!='deleted'].NatGatewayId" --output text || true)
          for nat in ${NATS}; do aws ec2 delete-nat-gateway --nat-gateway-id "$nat" || true; done
          if [ -n "${NATS}" ]; then
            for i in $(seq 1 20); do
              REMAINING=$(aws ec2 describe-nat-gateways \
                --filter "Name=vpc-id,Values=${VPC_ID}" \
                --query "NatGateways[?State!='deleted'].NatGatewayId" --output text || true)
              [ -z "$REMAINING" ] && echo "All NAT gateways deleted" && break
              echo "Waiting for NAT gateways... ($i/20)"; sleep 15
            done
          fi

          echo "=== Release EIPs ==="
          EIPS=$(aws ec2 describe-addresses \
            --filters "Name=domain,Values=vpc" \
            --query "Addresses[?AssociationId==null].AllocationId" --output text || true)
          for eip in ${EIPS}; do aws ec2 release-address --allocation-id "$eip" || true; done

          echo "=== Delete security groups ==="
          SGS=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --query "SecurityGroups[?GroupName!='default'].GroupId" --output text || true)
          for sg in ${SGS}; do aws ec2 delete-security-group --group-id "$sg" || true; done

          echo "=== Delete available ENIs ==="
          ENIS=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --query "NetworkInterfaces[?Status=='available'].NetworkInterfaceId" --output text || true)
          for eni in ${ENIS}; do aws ec2 delete-network-interface --network-interface-id "$eni" || true; done

  destroy-staging:
    name: Destroy Staging
    runs-on: ubuntu-latest
    needs: [pre-delete-staging]
    if: ${{ always() && inputs.action == 'destroy' }}
    environment: staging
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-destroy-staging
      - name: Delete ECR repositories
        run: |
          aws ecr delete-repository --repository-name frontend-staging --force --region ${{ env.AWS_REGION }} || true
          aws ecr delete-repository --repository-name backend-staging --force --region ${{ env.AWS_REGION }} || true
      - name: Clear stale DynamoDB state checksum
        run: |
          aws dynamodb delete-item \
            --table-name ${{ env.TF_LOCK_TABLE }} \
            --key '{"LockID":{"S":"${{ env.TF_STATE_BUCKET }}/eksdemo/staging/terraform.tfstate-md5"}}' \
            --region ${{ env.AWS_REGION }} || true
      - name: Terraform Init
        working-directory: infra/envs/staging
        run: terraform init -upgrade
      - name: Terraform Destroy
        working-directory: infra/envs/staging
        run: terraform destroy -auto-approve
        continue-on-error: true
      - name: Post-cleanup staging VPC (if Terraform timed out or left it)
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=eksdemo-staging-vpc" \
            --query "Vpcs[0].VpcId" --output text 2>/dev/null || echo "")
          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "Staging VPC already deleted"; exit 0
          fi
          echo "Staging VPC $VPC_ID still exists — cleaning up remaining resources..."
          SGS=$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "SecurityGroups[?GroupName!='default'].GroupId" --output text || true)
          for sg in $SGS; do
            INGRESS=$(aws ec2 describe-security-groups --group-ids "$sg" --query "SecurityGroups[0].IpPermissions" --output json)
            EGRESS=$(aws ec2 describe-security-groups --group-ids "$sg" --query "SecurityGroups[0].IpPermissionsEgress" --output json)
            [ "$INGRESS" != "[]" ] && aws ec2 revoke-security-group-ingress --group-id "$sg" --ip-permissions "$INGRESS" 2>/dev/null || true
            [ "$EGRESS" != "[]" ] && aws ec2 revoke-security-group-egress --group-id "$sg" --ip-permissions "$EGRESS" 2>/dev/null || true
            aws ec2 delete-security-group --group-id "$sg" || true
          done
          ENIS=$(aws ec2 describe-network-interfaces --filters "Name=vpc-id,Values=$VPC_ID" "Name=status,Values=available" \
            --query "NetworkInterfaces[*].NetworkInterfaceId" --output text || true)
          for eni in $ENIS; do aws ec2 delete-network-interface --network-interface-id "$eni" || true; done
          IGWS=$(aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
            --query "InternetGateways[*].InternetGatewayId" --output text || true)
          for igw in $IGWS; do
            aws ec2 detach-internet-gateway --internet-gateway-id "$igw" --vpc-id "$VPC_ID" || true
            aws ec2 delete-internet-gateway --internet-gateway-id "$igw" || true
          done
          SUBNETS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "Subnets[*].SubnetId" --output text || true)
          for subnet in $SUBNETS; do aws ec2 delete-subnet --subnet-id "$subnet" || true; done
          RTS=$(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "RouteTables[?Associations[?Main!=\`true\`] || !Associations].RouteTableId" --output text || true)
          for rt in $RTS; do aws ec2 delete-route-table --route-table-id "$rt" || true; done
          aws ec2 delete-vpc --vpc-id "$VPC_ID" || true
          echo "Staging VPC cleanup done"
      - name: Cleanup state
        run: aws s3 rm s3://${{ env.TF_STATE_BUCKET }}/eksdemo/staging/ --recursive || true

  destroy-prod:
    name: Destroy Prod
    runs-on: ubuntu-latest
