name: CI Staging

on:
  workflow_run:
    workflows: ["CD Staging"]
    types:
      - completed
    branches:
      - staging
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  qa-tests:
    name: QA Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install QA dependencies
        run: pip install -r services/tests/qa/requirements.txt

      - name: Run QA tests
        env:
          STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
          STAGING_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
        run: pytest services/tests/qa/ -v --tb=short

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: qa-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install E2E dependencies
        run: pip install -r services/tests/e2e/requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
        run: pytest services/tests/e2e/ -v --tb=short

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
