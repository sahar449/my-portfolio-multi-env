name: CI Dev

on:
  push:
    branches:
      - dev
      - 'feature/**'
    paths:
      - 'services/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-west-2
  IMAGE_TAG: ${{ github.sha }}

jobs:
  trivy-scan-frontend:
    name: Trivy Scan Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./services/frontend
          scanners: vuln,secret,config
          format: table
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

  trivy-scan-backend:
    name: Trivy Scan Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./services/backend
          scanners: vuln,secret,config
          format: table
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

  unit-test-frontend:
    name: Unit Tests Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: services/frontend
      - name: Run unit tests
        run: pytest tests/ -v
        working-directory: services/frontend

  unit-test-backend:
    name: Unit Tests Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: services/backend
      - name: Run unit tests
        run: pytest tests/ -v
        working-directory: services/backend

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: [trivy-scan-frontend, unit-test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-dev-frontend

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/build-push-action@v4
        with:
          context: ./services/frontend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:${{ env.IMAGE_TAG }}
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:${{ env.IMAGE_TAG }}
          scanners: vuln
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      - name: Smoke test frontend
        run: |
          docker run -d --name test-frontend -p 5000:5000 \
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/frontend-dev:${{ env.IMAGE_TAG }}
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000/health && break
            [ "$i" -eq 15 ] && docker logs test-frontend && exit 1
            sleep 2
          done
          docker rm -f test-frontend

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: [trivy-scan-backend, unit-test-backend]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-dev-backend

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/build-push-action@v4
        with:
          context: ./services/backend
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:${{ env.IMAGE_TAG }}
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:${{ env.IMAGE_TAG }}
          scanners: vuln
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      - name: Smoke test backend
        run: |
          docker run -d --name test-backend -p 5002:5002 \
            ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend-dev:${{ env.IMAGE_TAG }}
          for i in $(seq 1 15); do
            curl -sf http://localhost:5002/health && break
            [ "$i" -eq 15 ] && docker logs test-backend && exit 1
            sleep 2
          done
          docker rm -f test-backend

  open-pr-to-staging:
    name: Open PR to Staging
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEHIND=$(git rev-list --count origin/staging..origin/dev)
          if [ "$BEHIND" -eq 0 ]; then
            echo "dev and staging are in sync — no PR needed"
            exit 0
          fi

          EXISTING=$(gh pr list \
            --repo ${{ github.repository }} \
            --base staging --head dev \
            --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — skipping"
          else
            gh pr create \
              --repo ${{ github.repository }} \
              --base staging \
              --head dev \
              --title "promote: dev → staging (${{ github.sha }})" \
              --body "Automated PR after successful CI on dev. Review and merge to trigger staging pipeline."
          fi
